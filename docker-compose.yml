version: "3.9"

services:
  hellobooks-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: hellobooks-ai:latest
    container_name: hellobooks-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      TOP_K: ${TOP_K:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    volumes:
      - vector_store:/app/vector_store
      - model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vector_store:
    driver: local
  model_cache:
    driver: local
